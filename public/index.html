<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>R2 Drive</title>
    <link rel="stylesheet" href="/static/app.css?v=20260621-pages" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">R2</div>
          <div>
            <h1>R2 Drive</h1>
            <p>Cloudflare R2 网盘</p>
          </div>
        </div>

        <div class="actions">
          <button id="trashButton" type="button">回收站</button>
          <button id="logoutButton" type="button">退出</button>
        </div>

        <div class="upload-zone">
          <label class="file-picker">
            <input id="fileInput" type="file" multiple />
            <span>选择文件</span>
          </label>
          <p>选择文件后会直接上传到 R2。</p>
          <div id="uploadProgress" class="upload-progress" hidden>
            <div class="upload-progress-text">
              <span id="uploadProgressName"></span>
              <span id="uploadProgressPercent">0%</span>
            </div>
            <div class="upload-progress-track">
              <div id="uploadProgressBar" class="upload-progress-bar"></div>
            </div>
          </div>
        </div>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div>
            <div id="breadcrumbs" class="breadcrumbs">根目录</div>
            <p id="summary" class="summary">准备就绪</p>
          </div>

          <form id="folderForm" class="folder-form">
            <input id="folderNameInput" placeholder="新建文件夹" maxlength="255" />
            <button type="submit">新建</button>
          </form>
        </header>

        <div id="notice" class="notice" hidden></div>
        <div id="items" class="items"></div>
      </section>
    </main>

    <dialog id="previewDialog" class="preview-dialog">
      <div class="preview-header">
        <div id="previewTitle" class="preview-title"></div>
        <button id="previewCloseButton" type="button">关闭</button>
      </div>
      <img id="previewImage" class="preview-image" alt="" />
    </dialog>

    <dialog id="videoDialog" class="preview-dialog">
      <div class="preview-header">
        <div id="videoTitle" class="preview-title"></div>
        <button id="videoCloseButton" type="button">关闭</button>
      </div>
      <video id="videoPlayer" class="preview-image" controls playsinline></video>
    </dialog>

    <script src="/static/app.js?v=20260621-split-trash" type="module"></script>
  </body>
</html>
