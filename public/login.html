<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - R2 Drive</title>
    <link rel="stylesheet" href="/static/app.css?v=20260621-pages" />
  </head>
  <body>
    <main class="login-shell">
      <form id="loginForm" class="login-card">
        <div class="brand login-brand">
          <div class="brand-mark">R2</div>
          <div>
            <h1>R2 Drive</h1>
            <p>登录你的网盘</p>
          </div>
        </div>

        <label class="field">
          <span>用户名</span>
          <input id="usernameInput" autocomplete="username" />
        </label>

        <label class="field">
          <span>密码</span>
          <input id="passwordInput" type="password" autocomplete="current-password" />
        </label>

        <button class="primary login-button" type="submit">登录</button>
        <div id="loginNotice" class="notice error" hidden></div>
      </form>
    </main>

    <script src="/static/login.js?v=20260621-pages" type="module"></script>
  </body>
</html>
